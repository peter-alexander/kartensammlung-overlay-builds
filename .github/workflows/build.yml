name: Build overlay layers

on:
  workflow_dispatch:
    inputs:
      target:
        description: Layer to build
        required: true
        default: all
        type: choice
        options:
          - all
          - rge-analyse
          - radparken
          - sitzmoeglichkeiten
      build_legacy:
        description: Build legacy output (RgE geojson / tiles directories)
        required: true
        default: true
        type: boolean
  schedule:
    - cron: '30 1 * * *'

concurrency:
  group: overlay-builds
  cancel-in-progress: false

jobs:
  rge-analyse:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'rge-analyse' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      BUILD_LEGACY: ${{ github.event_name == 'workflow_dispatch' && inputs.build_legacy || true }}
      REMOTE_ROOT: ${{ vars.EASYNAME_REMOTE_ROOT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev lftp

      - name: Build tippecanoe
        id: tippecanoe
        run: |
          chmod +x .github/scripts/build-tippecanoe.sh
          TIPPECANOE_BIN_PATH="$(.github/scripts/build-tippecanoe.sh)"
          echo "tippecanoe_bin=$TIPPECANOE_BIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Install npm dependencies
        run: npm install --no-fund --no-audit

      - name: Build RgE-Analyse
        env:
          PATH: ${{ github.workspace }}/.local/bin:${{ env.PATH }}
        run: |
          node rge-analyse/build.mjs

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rge-analyse-build
          path: rge-analyse/build/
          if-no-files-found: error

      - name: Deploy PMTiles
        env:
          EASYNAME_FTP_HOST: ${{ secrets.EASYNAME_FTP_HOST }}
          EASYNAME_FTP_USER: ${{ secrets.EASYNAME_FTP_USER }}
          EASYNAME_FTP_PASSWORD: ${{ secrets.EASYNAME_FTP_PASSWORD }}
        run: |
          chmod +x .github/scripts/lftp-upload.sh
          REMOTE_BASE="${REMOTE_ROOT:+$REMOTE_ROOT/}RgE-Analyse"
          .github/scripts/lftp-upload.sh rge-analyse/build/rge_analyse.pmtiles "$REMOTE_BASE/rge_analyse.pmtiles"

      - name: Deploy legacy GeoJSON
        if: env.BUILD_LEGACY == 'true'
        env:
          EASYNAME_FTP_HOST: ${{ secrets.EASYNAME_FTP_HOST }}
          EASYNAME_FTP_USER: ${{ secrets.EASYNAME_FTP_USER }}
          EASYNAME_FTP_PASSWORD: ${{ secrets.EASYNAME_FTP_PASSWORD }}
        run: |
          chmod +x .github/scripts/lftp-upload.sh
          REMOTE_BASE="${REMOTE_ROOT:+$REMOTE_ROOT/}RgE-Analyse"
          .github/scripts/lftp-upload.sh rge-analyse/build/rge_analyse.geojson "$REMOTE_BASE/rge_analyse.geojson"

  radparken:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'radparken' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      BUILD_LEGACY: ${{ github.event_name == 'workflow_dispatch' && inputs.build_legacy || true }}
      REMOTE_ROOT: ${{ vars.EASYNAME_REMOTE_ROOT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev lftp

      - name: Build tippecanoe
        run: |
          chmod +x .github/scripts/build-tippecanoe.sh
          .github/scripts/build-tippecanoe.sh >/dev/null

      - name: Install npm dependencies
        run: npm install --no-fund --no-audit

      - name: Build Radparken
        env:
          TIPPECANOE_BIN: ${{ github.workspace }}/.local/bin/tippecanoe
          BUILD_PMTILES: true
          BUILD_PBF_TILES: ${{ env.BUILD_LEGACY }}
        run: |
          chmod +x radparken/run.sh
          bash radparken/run.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: radparken-build
          path: radparken/build/
          if-no-files-found: error

      - name: Deploy PMTiles
        env:
          EASYNAME_FTP_HOST: ${{ secrets.EASYNAME_FTP_HOST }}
          EASYNAME_FTP_USER: ${{ secrets.EASYNAME_FTP_USER }}
          EASYNAME_FTP_PASSWORD: ${{ secrets.EASYNAME_FTP_PASSWORD }}
        run: |
          chmod +x .github/scripts/lftp-upload.sh
          REMOTE_BASE="${REMOTE_ROOT:+$REMOTE_ROOT/}Radparken"
          .github/scripts/lftp-upload.sh radparken/build/radparken.pmtiles "$REMOTE_BASE/radparken.pmtiles"

      - name: Deploy legacy tiles
        if: env.BUILD_LEGACY == 'true'
        env:
          EASYNAME_FTP_HOST: ${{ secrets.EASYNAME_FTP_HOST }}
          EASYNAME_FTP_USER: ${{ secrets.EASYNAME_FTP_USER }}
          EASYNAME_FTP_PASSWORD: ${{ secrets.EASYNAME_FTP_PASSWORD }}
        run: |
          chmod +x .github/scripts/lftp-upload.sh
          REMOTE_BASE="${REMOTE_ROOT:+$REMOTE_ROOT/}Radparken"
          .github/scripts/lftp-upload.sh radparken/build/tiles "$REMOTE_BASE/tiles"

  sitzmoeglichkeiten:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'sitzmoeglichkeiten' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      BUILD_LEGACY: ${{ github.event_name == 'workflow_dispatch' && inputs.build_legacy || true }}
      REMOTE_ROOT: ${{ vars.EASYNAME_REMOTE_ROOT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev lftp

      - name: Build tippecanoe
        run: |
          chmod +x .github/scripts/build-tippecanoe.sh
          .github/scripts/build-tippecanoe.sh >/dev/null

      - name: Install npm dependencies
        run: npm install --no-fund --no-audit

      - name: Build Sitzmoeglichkeiten
        env:
          TIPPECANOE_BIN: ${{ github.workspace }}/.local/bin/tippecanoe
          BUILD_PMTILES: true
          BUILD_PBF_TILES: ${{ env.BUILD_LEGACY }}
        run: |
          chmod +x sitzmoeglichkeiten/run.sh
          bash sitzmoeglichkeiten/run.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sitzmoeglichkeiten-build
          path: sitzmoeglichkeiten/out/
          if-no-files-found: error

      - name: Deploy PMTiles
        env:
          EASYNAME_FTP_HOST: ${{ secrets.EASYNAME_FTP_HOST }}
          EASYNAME_FTP_USER: ${{ secrets.EASYNAME_FTP_USER }}
          EASYNAME_FTP_PASSWORD: ${{ secrets.EASYNAME_FTP_PASSWORD }}
        run: |
          chmod +x .github/scripts/lftp-upload.sh
          REMOTE_BASE="${REMOTE_ROOT:+$REMOTE_ROOT/}Sitzmoeglichkeiten"
          .github/scripts/lftp-upload.sh sitzmoeglichkeiten/out/wien-sitzdistanz.pmtiles "$REMOTE_BASE/wien-sitzdistanz.pmtiles"

      - name: Deploy legacy tiles
        if: env.BUILD_LEGACY == 'true'
        env:
          EASYNAME_FTP_HOST: ${{ secrets.EASYNAME_FTP_HOST }}
          EASYNAME_FTP_USER: ${{ secrets.EASYNAME_FTP_USER }}
          EASYNAME_FTP_PASSWORD: ${{ secrets.EASYNAME_FTP_PASSWORD }}
        run: |
          chmod +x .github/scripts/lftp-upload.sh
          REMOTE_BASE="${REMOTE_ROOT:+$REMOTE_ROOT/}Sitzmoeglichkeiten"
          .github/scripts/lftp-upload.sh sitzmoeglichkeiten/out/tiles "$REMOTE_BASE/tiles"
